<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول المتابعة</title>
    <style>
        /* تنسيق عام للحاوية لضمان عمل التمرير الأفقي على الموبايل */
        .table-container {
            width: 100%;
            overflow-x: auto; /* يسمح بالتمرير الأفقي عند الحاجة */
            -webkit-overflow-scrolling: touch; /* تمرير ناعم على هواتف آيفون */
            margin: 20px 0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            text-align: center;
        }

        /* تنسيق العناوين */
        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0e0e0;
            border-left: 1px solid #e0e0e0;
        }

        th:last-child, td:last-child {
            border-left: none; /* إزالة الحدود الأخيرة */
        }

        /* تثبيت عمود اسم الطفل عشان يفضل ظاهر أثناء التمرير */
        th.sticky-col, td.sticky-col {
            position: sticky;
            right: 0; /* التثبيت جهة اليمين لأن الاتجاه RTL */
            background-color: #f9f9f9;
            z-index: 2;
            min-width: 150px; /* مساحة مريحة لاسم الطفل */
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
        }

        th.sticky-col {
            background-color: #f1f1f1;
            font-weight: bold;
        }

        /* تظبيط أعمدة الأسابيع لمنع التداخل */
        th.week-header {
            min-width: 65px; /* يضمن مساحة كافية للكلمة والرقم */
            white-space: nowrap; /* يمنع النص من النزول لسطر جديد وتشوه المظهر */
            font-size: 13px;
            color: #333;
        }

        .week-number {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-top: 4px;
            color: #007bff; /* لون مميز للرقم */
        }

        /* تنسيق الخلايا الداخلية (الدوائر أو علامات الاختيار) */
        .check-cell {
            min-width: 65px;
        }

        /* تأثير عند تمرير الماوس على الصفوف */
        tr:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <!-- عمود الاسم مثبت -->
                <th class="sticky-col">اسم الطفل</th>
                <!-- أعمدة الأسابيع مع الفصل بين الكلمة والرقم لمنع التكديس -->
                <th class="week-header">أسبوع <span class="week-number">1</span></th>
                <th class="week-header">أسبوع <span class="week-number">2</span></th>
                <th class="week-header">أسبوع <span class="week-number">3</span></th>
                <th class="week-header">أسبوع <span class="week-number">4</span></th>
                <th class="week-header">أسبوع <span class="week-number">5</span></th>
                <th class="week-header">أسبوع <span class="week-number">6</span></th>
                <th class="week-header">أسبوع <span class="week-number">7</span></th>
                <th class="week-header">أسبوع <span class="week-number">8</span></th>
                <th class="week-header">أسبوع <span class="week-number">9</span></th>
                <th class="week-header">أسبوع <span class="week-number">10</span></th>
                <th class="week-header">أسبوع <span class="week-number">11</span></th>
                <th class="week-header">أسبوع <span class="week-number">12</span></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="sticky-col">انسطسيا ايهاب ابراهيم سعد</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
            </tr>
            <tr>
                <td class="sticky-col">بتول عزت خلف سعد</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
                <td class="check-cell">-</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
